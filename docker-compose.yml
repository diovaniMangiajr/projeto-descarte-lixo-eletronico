services:
  postgres:
    image: postgres:16-alpine
    container_name: descarte-eletronico-postgres
    environment:
      POSTGRES_DB: descarte_eletronico
      POSTGRES_USER: descarte
      POSTGRES_PASSWORD: descarte
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U descarte -d descarte_eletronico"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend/Descarte-Eletronico
      dockerfile: Dockerfile
    container_name: descarte-eletronico-backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=descarte_eletronico
      - DB_USERNAME=descarte
      - DB_PASSWORD=descarte
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: descarte-eletronico-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
